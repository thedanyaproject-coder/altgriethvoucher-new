<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Alt Grieth Gutschein</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #f2ebe3;
    display: flex;
    justify-content: center;
    padding: 30px;
    font-family: 'Cinzel', serif;
  }
  .voucher-container {
    width: 100%;
    max-width: 520px;
    padding: 20px;
    border: 5px solid #a67c52; /* goud-bruin kader */
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    background: #fff8f0 url('https://i.imgur.com/6bK2VxJ.png') no-repeat top right;
    background-size: 80px auto;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .voucher-container h1 {
    font-size: 36px;
    color: #8b4513;
    margin-bottom: 10px;
  }
  .voucher-container p {
    font-size: 24px;
    margin: 5px 0;
    font-weight: bold;
    color: #5a3e1b;
  }
  .voucher-text {
    font-size: 18px;
    line-height: 1.5;
    color: #5a3e1b;
    margin: 20px 0;
  }
  .voucher-iframe {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 15px;
  }
  .qr-code {
    position: absolute;
    bottom: 15px;
    right: 15px;
    width: 80px;
    height: 80px;
  }
</style>
</head>
<body>

<div class="voucher-container">
  <h1>GUTSCHEIN</h1>
  <p>für Alt Grieth</p>
  <p>Wert: <strong>50€</strong></p>

  <div class="voucher-text">
    Diese Online-Geschenkbon ist gültig bis 1 Jahr nach Kaufdatum<br>
    und nur zusammen mit der Kaufrechnung einlösbar.
  </div>

  <iframe class="voucher-iframe" src="URL_VAN_JOUW_VOUCHER" scrolling="no"></iframe>

  <img src="URL_VAN_JOUW_QR_CODE" alt="QR-Code" class="qr-code">
</div>

</body>
</html>
