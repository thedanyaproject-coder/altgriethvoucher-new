<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const { jsPDF } = window.jspdf;

document.getElementById("genBtn").addEventListener("click", function(){

  const naam = document.getElementById("naam").value;
  const bedrag = document.getElementById("bedrag").value;
  const tekst = document.getElementById("tekst").value;

  if(!naam || !bedrag){
    alert("Vul naam en bedrag in");
    return;
  }

  const code = "AG-" + Math.random().toString(36).substr(2,8).toUpperCase();
  const qr = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + code;

  document.getElementById("voucher").innerHTML = `
    <div class="voucher-box">
      <h1>GUTSCHEIN</h1>
      <h2>€${bedrag}</h2>
      <p><b>Für:</b> ${naam}</p>
      ${tekst ? `<p style="font-style:italic;margin:15px 0;">"${tekst}"</p>` : ""}
      <img src="${qr}" style="margin:20px 0;">
      <p><b>Code:</b> ${code}</p>
      <hr>
      <button id="downloadBtn">Download PDF</button>
    </div>
  `;

  document.getElementById("downloadBtn").addEventListener("click", function(){

    const pdf = new jsPDF();

    pdf.setFont("helvetica","bold");
    pdf.setFontSize(22);
    pdf.text("GUTSCHEIN ALT GRIETh", 20, 30);

    pdf.setFontSize(18);
    pdf.text("Bedrag: €" + bedrag, 20, 50);

    pdf.setFontSize(14);
    pdf.text("Voor: " + naam, 20, 65);

    if(tekst){
      pdf.text("Bericht: " + tekst, 20, 80);
    }

    pdf.text("Code: " + code, 20, 100);

    pdf.save("gutschein.pdf");
  });

});
</script>
