<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Gutschein Alt Grieth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts (middeleeuws / elegant) -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Great+Vibes&family=Cormorant+Garamond:wght@300;500&display=swap" rel="stylesheet">

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body {
  margin:0;
  background:#f4f1ea;
  font-family:'Cormorant Garamond', serif;
  display:flex;
  justify-content:center;
  padding:20px;
}

#container {
  max-width:600px;
  width:100%;
  background:white;
  padding:25px;
  border-radius:10px;
  text-align:center;
}

/* input */
input, textarea, button {
  width:95%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
  font-family:inherit;
}

button {
  background:#8b6b3e;
  color:white;
  border:none;
  cursor:pointer;
}

/* ===== VOUCHER ===== */

.voucher {
  width:1123px;
  height:794px;
  background:linear-gradient(135deg,#f5e6c8,#e8d3a3);
  position:relative;
  padding:60px;
  box-sizing:border-box;
  color:#3a2e1f;
}

/* perkament rand */
.border {
  position:absolute;
  top:20px; left:20px; right:20px; bottom:20px;
  border:3px solid #8b6b3e;
}

/* titel */
.title {
  font-family:'Cinzel', serif;
  font-size:40px;
  text-align:center;
  letter-spacing:3px;
}

.subtitle {
  font-family:'Great Vibes', cursive;
  text-align:center;
  font-size:40px;
  margin-top:10px;
}

/* bedrag */
.amount {
  font-size:80px;
  text-align:center;
  margin:60px 0;
}

/* naam */
.name {
  text-align:center;
  font-size:30px;
}

/* bericht */
.message {
  text-align:center;
  margin-top:20px;
  font-style:italic;
}

/* QR */
.qr {
  position:absolute;
  bottom:60px;
  left:60px;
}

/* code */
.code {
  position:absolute;
  bottom:60px;
  right:60px;
  font-size:14px;
}

/* footer */
.footer {
  position:absolute;
  bottom:20px;
  left:0;
  right:0;
  text-align:center;
  font-size:12px;
}

</style>
</head>

<body>

<div id="container">

<h2>Gutschein erstellen – Alt Grieth</h2>

<input id="naam" placeholder="Name des Empfängers">
<input id="bedrag" placeholder="Betrag (€)">
<textarea id="tekst" placeholder="Persönliche Nachricht (optional)"></textarea>

<button onclick="maakVoucher()">Gutschein erstellen</button>

<div id="preview"></div>

</div>

<script>

function maakVoucher(){

  let naam = document.getElementById("naam").value;
  let bedrag = document.getElementById("bedrag").value;
  let tekst = document.getElementById("tekst").value;

  if(!naam || !bedrag){
    alert("Bitte alles ausfüllen");
    return;
  }

  let code = "AG-" + Math.random().toString(36).substr(2,8).toUpperCase();

  document.getElementById("preview").innerHTML = `
  
  <div id="voucherPrint" class="voucher">
    <div class="border"></div>

    <div class="title">GASTHAUS ALT GRIETh</div>
    <div class="subtitle">Gutschein</div>

    <div class="amount">€${bedrag}</div>

    <div class="name">Für ${naam}</div>

    ${tekst ? `<div class="message">"${tekst}"</div>` : ""}

    <div id="qrcode" class="qr"></div>

    <div class="code">${code}</div>

    <div class="footer">
      Dieser Gutschein ist 1 Jahr gültig und nur zusammen mit der Rechnung einlösbar.
    </div>
  </div>

  <button onclick="downloadPDF()">PDF herunterladen</button>
  `;

  // QR code genereren
  new QRCode(document.getElementById("qrcode"), {
    text: code,
    width: 100,
    height: 100
  });
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;

  html2canvas(document.getElementById("voucherPrint"), {
    scale:2
  }).then(canvas => {

    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF('l','pt','a4'); // liggend!
    pdf.addImage(img,'PNG',0,0,842,595);

    pdf.save("gutschein-alt-grieth.pdf");
  });
}

</script>

</body>
</html>
