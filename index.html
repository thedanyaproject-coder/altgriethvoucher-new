<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Alt Grieth Gutschein</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: Georgia, serif;
    background-color: #f7f3ef;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  #container {
    max-width: 600px;
    width: 100%;
    text-align: center;
  }
  input, textarea, button {
    width: 90%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #b08a5b;
    font-size: 16px;
  }
  button {
    background-color: #b08a5b;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }
  #voucher {
    margin-top: 30px;
  }
  .voucher-box {
    position: relative;
    border: 3px solid #b08a5b;
    border-radius: 20px;
    background: linear-gradient(145deg,#fffaf3,#f5e6d3);
    padding: 35px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    text-align: center;
  }
  .voucher-box h1 {
    letter-spacing: 5px;
    color: #b08a5b;
    font-size: 48px;
    margin: 10px 0;
  }
  .voucher-box h2 {
    font-size: 50px;
    color: #000;
    margin: 15px 0;
  }
  .voucher-box p {
    font-size: 20px;
  }
  .voucher-box .small {
    font-size: 12px;
  }
  .voucher-box hr {
    border: 1px dashed #b08a5b;
    margin: 15px 0;
  }
  .voucher-logo {
    width: 120px;
    margin-bottom: 15px;
  }
</style>
</head>
<body>

<div id="container">
  <img src="https://i.imgur.com/6yZ0Ntb.png" alt="Alt Grieth Logo" class="voucher-logo">

  <h2 style="color:#b08a5b;">Gutschein Alt Grieth</h2>

  <input type="text" id="naam" placeholder="Naam ontvanger"><br>
  <input type="number" id="bedrag" placeholder="Bedrag (€)"><br>
  <textarea id="tekst" placeholder="Persoonlijke boodschap"></textarea><br>
  <button id="genBtn">Gutschein genereren</button>

  <div id="voucher"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("genBtn").addEventListener("click", function(){
    const naam = document.getElementById("naam").value;
    const bedrag = document.getElementById("bedrag").value;
    const tekst = document.getElementById("tekst").value;

    if(!naam || !bedrag){
      alert("Vul naam en bedrag in");
      return;
    }

    const code = "AG-" + Math.random().toString(36).substr(2,8).toUpperCase();
    const qr = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + code;

    document.getElementById("voucher").innerHTML = `
      <div class="voucher-box">
        <img src="https://i.imgur.com/6yZ0Ntb.png" alt="Alt Grieth Logo" class="voucher-logo">
        <h1>GUTSCHEIN</h1>
        <h2>€${bedrag}</h2>
        <p><b>Für:</b> ${naam}</p>
        ${tekst ? `<p style="margin:15px 0;font-style:italic;">"${tekst}"</p>` : ""}
        <img src="${qr}" style="margin:20px 0;">
        <p><b>Code:</b> ${code}</p>
        <hr>
        <p class="small">
          Dieser Gutschein ist 1 Jahr gültig und nur zusammen mit der Rechnung einlösbar.
        </p>
        <button onclick="window.print()">Download als PDF</button>
      </div>
    `;
  });
});
</script>

</body>
</html>
