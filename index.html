<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Alt Grieth Gutschein</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg,#2b2b2b,#1a1a1a);
  color:#333;
  display:flex;
  justify-content:center;
  padding:20px;
}

#container {
  max-width:600px;
  width:100%;
  text-align:center;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h2 {
  color:#b08a5b;
  margin-bottom:20px;
}

input, textarea, button {
  width:95%;
  padding:12px;
  margin-bottom:12px;
  border-radius:6px;
  border:1px solid #b08a5b;
  font-size:16px;
}

button {
  background:#b08a5b;
  color:white;
  border:none;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#8c6d45;
}

#voucher {
  margin-top:30px;
}

/* Voucher design */
.voucher-box {
  position:relative;
  background:linear-gradient(145deg,#fffaf0,#f2e3c6);
  border:4px solid #b08a5b;
  border-radius:20px;
  padding:35px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.voucher-box::before {
  content:"";
  position:absolute;
  inset:10px;
  border:2px dashed rgba(176,138,91,0.6);
  border-radius:15px;
}

.voucher-box h1 {
  letter-spacing:6px;
  font-size:42px;
  color:#b08a5b;
}

.voucher-box h2 {
  font-size:55px;
  margin:15px 0;
  color:#000;
}

.voucher-box p {
  font-size:18px;
}

.small {
  font-size:12px;
  margin-top:10px;
}

.logo {
  width:120px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div id="container">

  <h2>Gutschein Alt Grieth</h2>

  <input type="text" id="naam" placeholder="Naam ontvanger">
  <input type="number" id="bedrag" placeholder="Bedrag (€)">
  <textarea id="tekst" placeholder="Persoonlijke boodschap"></textarea>

  <button id="genBtn">Gutschein genereren</button>

  <div id="voucher"></div>

</div>

<script>
document.getElementById("genBtn").addEventListener("click", function(){

  const naam = document.getElementById("naam").value;
  const bedrag = document.getElementById("bedrag").value;
  const tekst = document.getElementById("tekst").value;

  if(!naam || !bedrag){
    alert("Vul naam en bedrag in");
    return;
  }

  const code = "AG-" + Math.random().toString(36).substr(2,8).toUpperCase();
  const qr = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + code;

  document.getElementById("voucher").innerHTML = `
    <div class="voucher-box">
      <h1>GUTSCHEIN</h1>
      <h2>€${bedrag}</h2>
      <p><b>Für:</b> ${naam}</p>

      ${tekst ? `<p style="font-style:italic;margin:15px 0;">"${tekst}"</p>` : ""}

      <img src="${qr}" style="margin:20px 0;">

      <p><b>Code:</b> ${code}</p>

      <hr style="margin:15px 0;">

      <p class="small">
        Dieser Gutschein ist 1 Jahr gültig und nur zusammen mit der Rechnung einlösbar.
      </p>

      <button onclick="window.print()">Download als PDF</button>
    </div>
  `;
});
</script>

</body>
</html>
