<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Gutschein Alt Grieth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family: Georgia, serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  padding:20px;
}

#container {
  max-width:600px;
  width:100%;
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input, textarea, button {
  width:95%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #b08a5b;
}

button {
  background:#b08a5b;
  color:white;
  border:none;
  cursor:pointer;
}

/* Gutschein Design */
.voucher {
  margin-top:20px;
  padding:30px;
  border:4px solid #b08a5b;
  border-radius:20px;
  background:linear-gradient(145deg,#fffaf0,#f2e3c6);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.voucher h1 {
  letter-spacing:5px;
  color:#b08a5b;
}

.voucher h2 {
  font-size:50px;
  margin:10px 0;
}

.small {
  font-size:12px;
}
</style>
</head>

<body>

<div id="container">

<h2>Gutschein erstellen – Alt Grieth</h2>

<input id="naam" placeholder="Name des Empfängers">
<input id="bedrag" placeholder="Betrag (€)">
<textarea id="tekst" placeholder="Persönliche Nachricht (optional)"></textarea>

<button onclick="maakVoucher()">Gutschein erstellen</button>

<div id="voucher"></div>

</div>

<script>

function maakVoucher(){

  let naam = document.getElementById("naam").value;
  let bedrag = document.getElementById("bedrag").value;
  let tekst = document.getElementById("tekst").value;

  if(!naam || !bedrag){
    alert("Bitte Name und Betrag eingeben");
    return;
  }

  let code = "AG-" + Math.random().toString(36).substr(2,8).toUpperCase();

  document.getElementById("voucher").innerHTML = `
    <div class="voucher" id="voucherPrint">
      <h1>GUTSCHEIN</h1>
      <h2>€${bedrag}</h2>
      <p><b>Für:</b> ${naam}</p>
      ${tekst ? `<p style="font-style:italic;">${tekst}</p>` : ""}
      <p><b>Gutscheincode:</b> ${code}</p>
      <hr>
      <p class="small">
        Dieser Gutschein ist 1 Jahr ab Kaufdatum gültig und nur zusammen mit der Rechnung einlösbar.
      </p>
    </div>

    <button onclick="downloadPDF()">Als PDF herunterladen</button>
  `;
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;

  html2canvas(document.getElementById("voucherPrint")).then(canvas => {

    const imgData = canvas.toDataURL("image/png");
    const pdf = new jsPDF();

    pdf.addImage(imgData, 'PNG', 10, 10, 180, 120);
    pdf.save("gutschein-alt-grieth.pdf");

  });
}

</script>

</body>
</html>
