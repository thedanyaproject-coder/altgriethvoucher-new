<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Gutschein Alt Grieth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body {
  margin:0;
  background:#111;
  font-family:'Inter', sans-serif;
  display:flex;
  justify-content:center;
  padding:20px;
}

#container {
  max-width:600px;
  width:100%;
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

input, textarea, button {
  width:95%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#c8a96a;
  color:white;
  border:none;
  cursor:pointer;
}

/* ===== VOUCHER ===== */

.voucher {
  width:794px;
  height:1123px;
  background:#1a1a1a;
  color:white;
  padding:60px;
  box-sizing:border-box;
  position:relative;
}

/* rand */
.border {
  position:absolute;
  top:20px; left:20px; right:20px; bottom:20px;
  border:2px solid #c8a96a;
}

/* lint boven */
.ribbon {
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:80px;
  background:#c8a96a;
}

/* strik */
.bow {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
}

/* bestek icoon */
.cutlery {
  position:absolute;
  top:120px;
  width:100%;
  text-align:center;
  opacity:0.25;
}

/* titel */
.title {
  font-family:'Playfair Display', serif;
  font-size:60px;
  letter-spacing:5px;
  text-align:center;
  margin-top:140px;
}

/* bedrag */
.amount {
  font-size:90px;
  text-align:center;
  margin:60px 0;
  font-weight:600;
}

/* naam */
.name {
  font-size:28px;
  text-align:center;
}

/* bericht */
.message {
  text-align:center;
  margin-top:20px;
  font-style:italic;
  opacity:0.8;
}

/* footer */
.footer {
  position:absolute;
  bottom:100px;
  left:60px;
  right:60px;
  text-align:center;
  font-size:14px;
  opacity:0.7;
}

/* code */
.code {
  position:absolute;
  bottom:40px;
  right:60px;
  font-size:12px;
  opacity:0.5;
}

</style>
</head>

<body>

<div id="container">

<h2>Gutschein erstellen – Alt Grieth</h2>

<input id="naam" placeholder="Name des Empfängers">
<input id="bedrag" placeholder="Betrag (€)">
<textarea id="tekst" placeholder="Persönliche Nachricht (optional)"></textarea>

<button onclick="maakVoucher()">Gutschein erstellen</button>

<div id="preview"></div>

</div>

<script>

function maakVoucher(){

  let naam = document.getElementById("naam").value;
  let bedrag = document.getElementById("bedrag").value;
  let tekst = document.getElementById("tekst").value;

  if(!naam || !bedrag){
    alert("Bitte alles ausfüllen");
    return;
  }

  let code = "AG-" + Math.random().toString(36).substr(2,8).toUpperCase();

  document.getElementById("preview").innerHTML = `
  
  <div id="voucherPrint" class="voucher">

    <div class="border"></div>

    <div class="ribbon"></div>
    <div class="bow">🎀</div>

    <div class="cutlery">
      <svg width="80" height="40" viewBox="0 0 100 40" fill="#c8a96a">
        <rect x="10" y="0" width="4" height="40"/>
        <rect x="20" y="0" width="4" height="40"/>
        <rect x="30" y="0" width="4" height="40"/>
        <rect x="60" y="0" width="6" height="40"/>
        <rect x="70" y="0" width="6" height="25"/>
      </svg>
    </div>

    <div class="title">GUTSCHEIN</div>

    <div class="amount">€${bedrag}</div>

    <div class="name">Für ${naam}</div>

    ${tekst ? `<div class="message">"${tekst}"</div>` : ""}

    <div class="footer">
      Ein Geschenk für genussvolle Momente im Alt Grieth<br><br>
      Dieser Gutschein ist 1 Jahr gültig und nur zusammen mit der Rechnung einlösbar.
    </div>

    <div class="code">${code}</div>

  </div>

  <button onclick="downloadPDF()">PDF herunterladen</button>
  `;
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;

  html2canvas(document.getElementById("voucherPrint"), {
    scale:2
  }).then(canvas => {

    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF('p','pt','a4');
    pdf.addImage(img,'PNG',0,0,595,842);

    pdf.save("gutschein-alt-grieth.pdf");
  });
}

</script>

</body>
</html>
